<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나이 계산기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 520px;
            width: 100%;
        }

        .today {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 32px;
            letter-spacing: 1px;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 36px;
            margin-bottom: 32px;
        }

        .greeting {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 28px;
        }

        .age-display {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .age-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .age-number {
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .age-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }

        .age-separator {
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.2);
            align-self: flex-start;
            margin-top: 8px;
        }

        .summary {
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.8;
        }

        .summary strong {
            color: #ffd200;
        }

        .total-days {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 16px;
        }

        .birth-input {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .birth-input label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .birth-input input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 10px 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .birth-input input:focus {
            border-color: #ffd200;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .next-birthday {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .next-birthday strong {
            color: #f7971e;
        }

        .notification-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .notification-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.8);
        }

        .notification-btn.active {
            border-color: #f7971e;
            color: #ffd200;
        }

        .notification-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
        }

        .notification-btn.active .notification-dot {
            background: #ffd200;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="today" id="todayDate"></div>

        <div class="card">
            <div class="greeting">오늘 당신의 나이는</div>

            <div class="age-display">
                <div class="age-unit">
                    <span class="age-number" id="years">0</span>
                    <span class="age-label">세</span>
                </div>
                <span class="age-separator">:</span>
                <div class="age-unit">
                    <span class="age-number" id="months">0</span>
                    <span class="age-label">개월</span>
                </div>
                <span class="age-separator">:</span>
                <div class="age-unit">
                    <span class="age-number" id="days">0</span>
                    <span class="age-label">일</span>
                </div>
            </div>

            <div class="summary" id="summary"></div>
            <div class="total-days" id="totalDays"></div>

            <div class="next-birthday" id="nextBirthday"></div>
        </div>

        <div class="birth-input">
            <label for="birthdate">생년월일</label>
            <input type="date" id="birthdate" value="1984-11-06">
        </div>

        <button class="notification-btn" id="notifBtn" onclick="toggleNotification()">
            <span class="notification-dot" id="notifDot"></span>
            <span id="notifLabel">매일 아침 8시 알림 켜기</span>
        </button>
    </div>

    <script>
        const birthdateInput = document.getElementById('birthdate');

        // 한국 시간(KST, UTC+9) 기준으로 현재 날짜/시간 구하기
        function getKSTNow() {
            const now = new Date();
            // UTC 시간에 9시간을 더해서 KST 구성요소 추출
            const kst = new Date(now.getTime() + (9 * 60 * 60 * 1000) + (now.getTimezoneOffset() * 60 * 1000));
            return {
                year: kst.getFullYear(),
                month: kst.getMonth(),   // 0-indexed
                date: kst.getDate(),
                day: kst.getDay(),
                hours: kst.getHours(),
                minutes: kst.getMinutes(),
                // 자정까지 남은 ms
                msUntilMidnight: (
                    new Date(kst.getFullYear(), kst.getMonth(), kst.getDate() + 1).getTime()
                    - kst.getTime()
                )
            };
        }

        function calculateAge() {
            const kst = getKSTNow();
            const birth = new Date(birthdateInput.value + 'T00:00:00');

            if (isNaN(birth.getTime())) return;

            const birthYear = birth.getFullYear();
            const birthMonth = birth.getMonth();
            const birthDate = birth.getDate();

            // Display today's date (KST)
            const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
            const todayStr = `${kst.year}년 ${kst.month + 1}월 ${kst.date}일 (${weekdays[kst.day]}) KST`;
            document.getElementById('todayDate').textContent = todayStr;

            // Calculate years, months, days
            let years = kst.year - birthYear;
            let months = kst.month - birthMonth;
            let days = kst.date - birthDate;

            if (days < 0) {
                months--;
                // 이전 달의 마지막 날
                const prevMonthLastDay = new Date(kst.year, kst.month, 0).getDate();
                days += prevMonthLastDay;
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            // Update display
            document.getElementById('years').textContent = years;
            document.getElementById('months').textContent = months;
            document.getElementById('days').textContent = days;

            document.getElementById('summary').innerHTML =
                `오늘 당신은 <strong>${years}세 ${months}개월 ${days}일</strong> 입니다.`;

            // Total days alive (KST 기준)
            const kstToday = new Date(kst.year, kst.month, kst.date);
            const birthDay = new Date(birthYear, birthMonth, birthDate);
            const totalDays = Math.floor((kstToday.getTime() - birthDay.getTime()) / (1000 * 60 * 60 * 24));
            document.getElementById('totalDays').textContent =
                `태어난 지 ${totalDays.toLocaleString()}일째`;

            // Next birthday
            let nextBirthday = new Date(kst.year, birthMonth, birthDate);
            if (nextBirthday <= kstToday) {
                nextBirthday = new Date(kst.year + 1, birthMonth, birthDate);
            }

            const daysUntil = Math.round((nextBirthday.getTime() - kstToday.getTime()) / (1000 * 60 * 60 * 24));

            if (daysUntil === 0) {
                document.getElementById('nextBirthday').innerHTML =
                    `&#127874; <strong>오늘은 생일입니다! 축하합니다!</strong>`;
            } else {
                document.getElementById('nextBirthday').innerHTML =
                    `다음 생일 (${years + 1}세) 까지 <strong>${daysUntil}일</strong> 남았습니다.`;
            }
        }

        birthdateInput.addEventListener('change', calculateAge);

        // Initial calculation
        calculateAge();

        // KST 자정에 자동 업데이트
        function scheduleNextUpdate() {
            const kst = getKSTNow();

            setTimeout(() => {
                calculateAge();
                scheduleNextUpdate();
            }, kst.msUntilMidnight);
        }

        scheduleNextUpdate();

        // ── 매일 아침 8시(KST) 알림 ──
        const NOTIF_KEY = 'age-calc-notif-enabled';
        const notifBtn = document.getElementById('notifBtn');
        const notifDot = document.getElementById('notifDot');
        const notifLabel = document.getElementById('notifLabel');
        let notifTimer = null;

        function getAgeText() {
            const kst = getKSTNow();
            const birth = new Date(birthdateInput.value + 'T00:00:00');
            const birthYear = birth.getFullYear();
            const birthMonth = birth.getMonth();
            const birthDate = birth.getDate();

            let years = kst.year - birthYear;
            let months = kst.month - birthMonth;
            let days = kst.date - birthDate;
            if (days < 0) { months--; days += new Date(kst.year, kst.month, 0).getDate(); }
            if (months < 0) { years--; months += 12; }

            return `${years}세 ${months}개월 ${days}일`;
        }

        function getMsUntilKST8AM() {
            const kst = getKSTNow();
            // 오늘 KST 오전 8시
            let target = new Date(kst.year, kst.month, kst.date, 8, 0, 0);
            // 이미 8시가 지났으면 내일 8시
            const kstNowDate = new Date(kst.year, kst.month, kst.date, kst.hours, kst.minutes);
            if (kstNowDate >= target) {
                target = new Date(kst.year, kst.month, kst.date + 1, 8, 0, 0);
            }
            return target.getTime() - kstNowDate.getTime();
        }

        function sendNotification() {
            if (Notification.permission === 'granted') {
                const ageText = getAgeText();
                new Notification('오늘의 나이', {
                    body: `오늘 당신은 ${ageText} 입니다.`,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🎂</text></svg>'
                });
            }
            calculateAge();
            // 다음 날 8시 예약 (24시간 후)
            scheduleNotification();
        }

        function scheduleNotification() {
            if (notifTimer) clearTimeout(notifTimer);
            const ms = getMsUntilKST8AM();
            notifTimer = setTimeout(sendNotification, ms);
        }

        function updateNotifUI(enabled) {
            if (enabled) {
                notifBtn.classList.add('active');
                notifLabel.textContent = '매일 아침 8시 알림 ON';
            } else {
                notifBtn.classList.remove('active');
                notifLabel.textContent = '매일 아침 8시 알림 켜기';
            }
        }

        async function toggleNotification() {
            const currentlyEnabled = localStorage.getItem(NOTIF_KEY) === 'true';

            if (currentlyEnabled) {
                // 알림 끄기
                localStorage.setItem(NOTIF_KEY, 'false');
                if (notifTimer) clearTimeout(notifTimer);
                notifTimer = null;
                updateNotifUI(false);
                return;
            }

            // 알림 켜기 - 권한 요청
            if (!('Notification' in window)) {
                alert('이 브라우저는 알림을 지원하지 않습니다.');
                return;
            }

            let permission = Notification.permission;
            if (permission === 'default') {
                permission = await Notification.requestPermission();
            }

            if (permission === 'granted') {
                localStorage.setItem(NOTIF_KEY, 'true');
                updateNotifUI(true);
                scheduleNotification();
            } else {
                alert('알림 권한이 필요합니다. 브라우저 설정에서 알림을 허용해주세요.');
            }
        }

        // 페이지 로드 시 알림 상태 복원
        if (localStorage.getItem(NOTIF_KEY) === 'true' && Notification.permission === 'granted') {
            updateNotifUI(true);
            scheduleNotification();
        }
    </script>
</body>
</html>
